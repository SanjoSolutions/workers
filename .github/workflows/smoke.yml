name: Smoke Tests

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  smoke-claude:
    name: Smoke — Claude
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm install -g @anthropic-ai/claude-code
      - name: Set up Claude credentials
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true,"theme":"dark"}' > ~/.claude.json
          echo '{"model":"claude-opus-4-6"}' > ~/.claude/settings.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: pnpm run test:smoke:claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  smoke-codex:
    name: Smoke — Codex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm install -g @openai/codex
      - run: pnpm run test:smoke:codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  smoke-gemini:
    name: Smoke — Gemini
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm install -g @google/gemini-cli
      - run: pnpm run test:smoke:gemini
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
