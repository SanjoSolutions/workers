name: Remove in-progress label

on:
  issues:
    types: [closed]

jobs:
  remove-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'workers:in-progress';

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: labelName,
              });
              console.log(`Removed label "${labelName}" from issue #${context.issue.number}`);
            } catch (error) {
              // Label may not exist, which is fine
              if (error.message.includes('404') || error.message.includes('not found')) {
                console.log(`Label "${labelName}" not found on issue #${context.issue.number}`);
              } else {
                throw error;
              }
            }
