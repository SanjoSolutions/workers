name: Remove in-progress label

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  remove-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labelNames = [
              'workers:in-progress',
              'workers:pr-ready',
              'workers:ready-to-be-picked-up',
            ];
            const issueLabels = (context.payload.issue?.labels ?? [])
              .map((label) => label?.name)
              .filter((name) => typeof name === 'string');
            const labelsToRemove = labelNames.filter((labelName) => issueLabels.includes(labelName));

            if (labelsToRemove.length === 0) {
              console.log(`No worker labels to remove from issue #${context.issue.number}`);
              return;
            }

            for (const labelName of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: labelName,
              });
              console.log(`Removed label "${labelName}" from issue #${context.issue.number}`);
            }
